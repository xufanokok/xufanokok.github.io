              <div class="info-content list-lines" contenteditable="true" data-field="definition">中文：在学校学习的人。
越南语：Người học ở trường, học sinh hoặc sinh viên.</div>
            </div>
            <div class="info-section wide">
              <div class="info-label">5. 语法重点</div>
              <div class="info-content list-lines" contenteditable="true" data-field="grammar">常作主语或宾语。
