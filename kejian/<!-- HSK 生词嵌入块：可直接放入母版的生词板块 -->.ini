            </div>
            <div class="info-section wide">
              <div class="info-label">6. 例句</div>
              <div class="info-content list-lines" contenteditable="true" data-field="examples"><ruby>我<rt>wǒ</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>他<rt>tā</rt></ruby><ruby>也<rt>yě</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>这<rt>zhè</rt></ruby><ruby>个<rt>gè</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>很<rt>hěn</rt></ruby><ruby>认<rt>rèn</rt></ruby><ruby>真<rt>zhēn</rt></ruby>。<br><ruby>学<rt>xué</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>教<rt>jiào</rt></ruby><ruby>室<rt>shì</rt></ruby><ruby>里<rt>lǐ</rt></ruby>。</div>
