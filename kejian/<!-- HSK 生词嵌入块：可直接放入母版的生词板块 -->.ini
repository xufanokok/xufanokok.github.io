（感叹词 + 礼貌问候语）</div>
            </div>
            <div class="info-section wide">
              <div class="info-label">4. 释义</div>
              <div class="info-content list-lines" contenteditable="true" data-field="definition">中文：用于见面时打招呼，表示礼貌、问候。
越南语：Lời chào hỏi khi gặp người, dùng để thể hiện sự lịch sự, thân thiện.</div>
            </div>
            <div class="info-section wide">
              <div class="info-label">5. 语法重点</div>
              <div class="info-content list-lines" contenteditable="true" data-field="grammar">固定问候语，不能拆分单独使用。
用在见面、打招呼、打电话开头。
不分早晚，全天都能用。
后面可以加称呼：
你好，老师！
你好，同学！</div>
            </div>
            <div class="info-section wide">
              <div class="info-label">6. 例句</div>
              <div class="info-content list-lines" contenteditable="true" data-field="examples"><ruby>你<rt>nǐ</rt></ruby><ruby>好<rt>hǎo</rt></ruby>！<br><ruby>老<rt>lǎo</rt></ruby><ruby>师<rt>shī</rt></ruby>，<ruby>你<rt>nǐ</rt></ruby><ruby>好<rt>hǎo</rt></ruby>！<br><ruby>大<rt>dà</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>好<rt>hǎo</rt></ruby>！<br><ruby>你<rt>nǐ</rt></ruby><ruby>好<rt>hǎo</rt></ruby>，<ruby>我<rt>wǒ</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>生<rt>shēng</rt></ruby>。</div>
            </div>
          </section>
        </div>
      </article>
    
