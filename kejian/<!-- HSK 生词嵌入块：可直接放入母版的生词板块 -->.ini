.hsk-vocab-block .flip-pinyin{font-size:26px;line-height:1.1;color:#1d4ed8;font-weight:700;min-height:34px;display:flex;align-items:center;justify-content:center;letter-spacing:.03em;}
.hsk-vocab-block .flip-vi{font-size:24px;line-height:1.15;color:#0f766e;font-weight:700;min-height:32px;display:flex;align-items:center;justify-content:center;max-width:100%;text-align:center;padding-top:8px;border-top:1px dashed rgba(15,118,110,.22);}
.hsk-vocab-block .flip-card.is-face-word .flip-card-inner{background:radial-gradient(circle at top,rgba(251,191,36,.2),transparent 40%),linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,247,237,.98));box-shadow:inset 0 0 0 1px rgba(251,191,36,.15);}
.hsk-vocab-block .flip-card.is-face-word .flip-card-value{color:#9a3412;text-shadow:0 1px 0 rgba(255,255,255,.7);}
.hsk-vocab-block .flip-card.is-face-pinyin .flip-card-inner{background:radial-gradient(circle at top,rgba(37,99,235,.18),transparent 42%),linear-gradient(180deg,rgba(255,255,255,.98),rgba(239,246,255,.98));box-shadow:inset 0 0 0 1px rgba(37,99,235,.14);}
.hsk-vocab-block .flip-card.is-face-pinyin .flip-card-value{color:#1e3a8a;}
.hsk-vocab-block .flip-card[data-state="3"] .flip-card-inner{background:radial-gradient(circle at bottom,rgba(20,184,166,.18),transparent 44%),linear-gradient(180deg,rgba(255,255,255,.98),rgba(240,253,250,.98));box-shadow:inset 0 0 0 1px rgba(15,118,110,.14);}
@media (max-width:1080px){.hsk-vocab-block .card-body{grid-template-columns:1fr;}}
@media (max-width:768px){.hsk-vocab-block .info-grid{grid-template-columns:1fr;}.hsk-vocab-block .writer-box{width:148px;height:148px;}.hsk-vocab-block .writer-char-pinyin{font-size:18px;}.hsk-vocab-block .flip-card{min-height:220px;}.hsk-vocab-block .flip-card-inner{min-height:184px;}.hsk-vocab-block .flip-card-value{font-size:40px;min-height:48px;}.hsk-vocab-block .flip-head{flex-direction:column;align-items:stretch;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script>
(function(){
  const root = document.getElementById("hsk-vocab-block-1774001404118");
  if (!root) return;
  const writerConfig = [{"id":"hsk-vocab-block-1774001404118-card-0-writer-0","char":"你"},{"id":"hsk-vocab-block-1774001404118-card-0-writer-1","char":"好"},{"id":"hsk-vocab-block-1774001404118-card-1-writer-0","char":"老"},{"id":"hsk-vocab-block-1774001404118-card-1-writer-1","char":"师"},{"id":"hsk-vocab-block-1774001404118-card-2-writer-0","char":"学"},{"id":"hsk-vocab-block-1774001404118-card-2-writer-1","char":"生"},{"id":"hsk-vocab-block-1774001404118-card-3-writer-0","char":"学"},{"id":"hsk-vocab-block-1774001404118-card-3-writer-1","char":"习"}];
  writerConfig.forEach(({id,char}) => {
    HanziWriter.create(id, char, {
      width: 168,
      height: 168,
      padding: 6,
      delayBetweenLoops: 500,
      strokeAnimationSpeed: 1.1,
      strokeColor: "#0f172a",
      radicalColor: "#2563eb",
      outlineColor: "rgba(37, 99, 235, 0.18)"
    }).loopCharacterAnimation();
  });

  function renderFlipFace(flipCard, state) {
    const innerEl = flipCard.querySelector(".flip-card-inner");
    flipCard.dataset.state = String(state);
    flipCard.classList.toggle("is-face-down", state === 0);
    flipCard.classList.toggle("is-face-word", state === 1);
    flipCard.classList.toggle("is-face-pinyin", state === 2 || state === 3);

    if (state === 0) {
      innerEl.innerHTML = '<span class="flip-card-face-pattern" aria-hidden="true"></span><span class="flip-card-corner top-left" aria-hidden="true"></span><span class="flip-card-corner bottom-right" aria-hidden="true"></span><span class="flip-card-value"></span>';
      return;
    }
    if (state === 1) {
      innerEl.innerHTML = '<div class="flip-word-stack"><span class="flip-pinyin"></span><span class="flip-card-value">' + (flipCard.dataset.word || '') + '</span><span class="flip-vi"></span></div>';
      return;
    }
    if (state === 2) {
      innerEl.innerHTML = '<div class="flip-word-stack"><span class="flip-pinyin">' + (flipCard.dataset.pinyin || '') + '</span><span class="flip-card-value">' + (flipCard.dataset.word || '') + '</span><span class="flip-vi"></span></div>';
      return;
    }
    innerEl.innerHTML = '<div class="flip-word-stack"><span class="flip-pinyin">' + (flipCard.dataset.pinyin || '') + '</span><span class="flip-card-value">' + (flipCard.dataset.word || '') + '</span><span class="flip-vi">' + (flipCard.dataset.vi || '') + '</span></div>';
  }

  root.querySelectorAll(".flip-card").forEach((flipCard) => renderFlipFace(flipCard, 0));
  root.addEventListener("click", (event) => {
    if (event.target.closest(".flip-status")) {
      const actionButton = event.target.closest("button");
      const flipCard = event.target.closest(".flip-card");
      if (!actionButton || !flipCard) return;
      if (actionButton.classList.contains("flip-mark-master")) {
        flipCard.classList.toggle("is-mastered");
        flipCard.classList.remove("needs-review");
      }
      if (actionButton.classList.contains("flip-mark-review")) {
        flipCard.classList.toggle("needs-review");
        flipCard.classList.remove("is-mastered");
      }
      return;
    }
    const flipCard = event.target.closest(".flip-card");
    if (!flipCard) return;
    const state = Number(flipCard.dataset.state || "0");
    renderFlipFace(flipCard, (state + 1) % 4);
  });
  root.addEventListener("keydown", (event) => {
    const flipCard = event.target.closest(".flip-card");
    if (!flipCard) return;
    if (event.key !== "Enter" && event.key !== " ") return;
    event.preventDefault();
    const state = Number(flipCard.dataset.state || "0");
    renderFlipFace(flipCard, (state + 1) % 4);
  });
  const resetButton = root.querySelector("#hsk-vocab-block-1774001404118-reset");
  const shuffleButton = root.querySelector("#hsk-vocab-block-1774001404118-shuffle");
  if (resetButton) {
    resetButton.addEventListener("click", () => {
      root.querySelectorAll(".flip-card").forEach((flipCard) => renderFlipFace(flipCard, 0));
    });
  }
  if (shuffleButton) {
    shuffleButton.addEventListener("click", () => {
      const grid = root.querySelector(".flip-grid");
      if (!grid) return;
      [...grid.children].sort(() => Math.random() - 0.5).forEach((card) => grid.appendChild(card));
    });
  }
})();
</script>