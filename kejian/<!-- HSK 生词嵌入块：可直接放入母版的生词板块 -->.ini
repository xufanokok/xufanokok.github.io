            <div class="info-section wide">
              <div class="info-label">4. 释义</div>
              <div class="info-content list-lines" contenteditable="true" data-field="definition">中文：指在学校或课堂中教授学生的人。
越南语：Người dạy học, giáo viên.</div>
            </div>
            <div class="info-section wide">
              <div class="info-label">5. 语法重点</div>
              <div class="info-content list-lines" contenteditable="true" data-field="grammar">可以单独作称呼。
常与问候语搭配使用：老师，您好！
也可出现在职业介绍句中：我是老师。</div>
            </div>
            <div class="info-section wide">
              <div class="info-label">6. 例句</div>
              <div class="info-content list-lines" contenteditable="true" data-field="examples"><ruby>老<rt>lǎo</rt></ruby><ruby>师<rt>shī</rt></ruby>，<ruby>您<rt>nín</rt></ruby><ruby>好<rt>hǎo</rt></ruby>！<br><ruby>这<rt>zhè</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>们<rt>men</rt></ruby><ruby>的<rt>de</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>师<rt>shī</rt></ruby>。<br><ruby>王<rt>wáng</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>师<rt>shī</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>教<rt>jiào</rt></ruby><ruby>室<rt>shì</rt></ruby><ruby>里<rt>lǐ</rt></ruby>。<br><ruby>我<rt>wǒ</rt></ruby><ruby>喜<rt>xǐ</rt></ruby><ruby>欢<rt>huān</rt></ruby><ruby>汉<rt>hàn</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>师<rt>shī</rt></ruby>。</div>
            </div>
